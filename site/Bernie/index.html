<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Argus Kalshi Candles</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050807;
        --panel: #0b1110;
        --panel-strong: #101816;
        --text: #e7ece9;
        --muted: #87938e;
        --line: #1d2a26;
        --accent: #49d18b;
        --accent-soft: #0e2a20;
        --warn: #e2b254;
        --bad: #ff6b6b;
        --good: #55d98c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 20% -10%, rgba(47, 118, 82, 0.16), transparent 30%),
          linear-gradient(180deg, #07100d 0%, var(--bg) 34%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1480px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 24px 0 36px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        margin-bottom: 18px;
      }

      .brand-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: end;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 3px;
        color: #f4faf7;
        font-size: 30px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      h2 {
        color: #f4faf7;
        font-size: 17px;
        line-height: 1.2;
      }

      h3 {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .status {
        min-height: 38px;
        padding: 9px 12px;
        border: 1px solid #214233;
        border-radius: 8px;
        background: rgba(73, 209, 139, 0.08);
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        text-align: right;
      }

      .search {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 10px;
      }

      .input {
        width: 100%;
        min-height: 42px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        outline: 0;
        background: var(--panel);
        color: var(--text);
      }

      .input:focus,
      .select:focus,
      .button:focus-visible,
      .seg-button:focus-visible,
      .market-row:focus-visible {
        border-color: #286744;
        box-shadow: 0 0 0 3px rgba(73, 209, 139, 0.13);
      }

      .button,
      .seg-button,
      .market-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        color: var(--text);
      }

      .button {
        min-height: 42px;
        padding: 0 15px;
        font-weight: 800;
      }

      .button:hover,
      .seg-button:hover,
      .market-row:hover {
        border-color: #286744;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 350px;
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
      }

      .chart-panel {
        min-width: 0;
        overflow: hidden;
      }

      .chart-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: start;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      }

      .market-title {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .controls {
        display: grid;
        grid-auto-flow: column;
        gap: 8px;
        align-items: center;
      }

      .seg {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 4px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #08100e;
      }

      .seg-button {
        min-width: 44px;
        min-height: 30px;
        padding: 0 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .seg-button.active {
        border-color: #286744;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .select {
        min-height: 38px;
        padding: 0 28px 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        outline: 0;
        background: var(--panel-strong);
        color: var(--text);
        font-weight: 800;
      }

      .range-row {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
      }

      .range-row .seg-button {
        min-width: 0;
      }

      .chart-wrap {
        position: relative;
        height: min(680px, calc(100vh - 246px));
        min-height: 520px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
        background-size: 96px 72px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      .empty {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 28px;
        background: rgba(5, 8, 7, 0.64);
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }

      .empty.show {
        display: grid;
      }

      .tooltip {
        position: absolute;
        z-index: 4;
        display: none;
        min-width: 210px;
        padding: 10px 11px;
        border: 1px solid #286744;
        border-radius: 8px;
        background: rgba(11, 17, 16, 0.96);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
        color: var(--text);
        font-size: 12px;
        pointer-events: none;
      }

      .tooltip strong {
        display: block;
        margin-bottom: 6px;
        color: #f4faf7;
        font-size: 12px;
      }

      .tooltip-grid {
        display: grid;
        grid-template-columns: repeat(2, auto);
        gap: 3px 14px;
      }

      .tooltip span:nth-child(odd) {
        color: var(--muted);
      }

      .side {
        display: grid;
        gap: 18px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 14px;
      }

      .metric {
        min-height: 82px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      }

      .metric.primary {
        border-color: #286744;
        background: var(--accent-soft);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 8px;
        color: #f4faf7;
        font-size: 25px;
        line-height: 1;
      }

      .side-section {
        padding: 14px;
      }

      .side-section + .side-section {
        border-top: 1px solid var(--line);
      }

      .meta-list {
        display: grid;
        gap: 9px;
        margin-top: 12px;
      }

      .meta-row {
        display: grid;
        grid-template-columns: 104px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        font-size: 12px;
      }

      .meta-row span:first-child {
        color: var(--muted);
        font-weight: 800;
        text-transform: uppercase;
      }

      .meta-row span:last-child {
        min-width: 0;
        overflow-wrap: anywhere;
        color: var(--text);
      }

      .market-list {
        display: grid;
        gap: 7px;
        max-height: 470px;
        margin-top: 12px;
        overflow: auto;
        padding-right: 2px;
      }

      .market-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        width: 100%;
        min-height: 42px;
        padding: 8px 9px;
        text-align: left;
      }

      .market-row.active {
        border-color: #286744;
        background: var(--accent-soft);
      }

      .market-row strong {
        display: block;
        overflow: hidden;
        color: #f4faf7;
        font-size: 12px;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .market-row small {
        color: var(--muted);
        font-size: 11px;
      }

      .market-price {
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }

      .note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      @media (max-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .side {
          grid-template-columns: 1fr;
        }

        .chart-wrap {
          height: 62vh;
          min-height: 440px;
        }
      }

      @media (max-width: 720px) {
        .app {
          width: min(100% - 20px, 1480px);
          padding-top: 16px;
        }

        .brand-row,
        .chart-head,
        .search {
          grid-template-columns: 1fr;
        }

        .status {
          text-align: left;
        }

        .controls {
          grid-auto-flow: row;
          justify-items: start;
        }

        .range-row {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .metric-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand-row">
          <div>
            <div class="eyebrow">Argus</div>
            <h1>Kalshi Market Candles</h1>
          </div>
          <div id="status" class="status">Ready</div>
        </div>
        <form id="searchForm" class="search">
          <input
            id="marketInput"
            class="input"
            autocomplete="off"
            spellcheck="false"
            value="KXTRUTHSOCIAL-26MAY30-T220"
            aria-label="Kalshi market URL or ticker"
          />
          <button class="button" type="submit">Load</button>
        </form>
      </header>

      <section class="layout" aria-label="Market chart">
        <div class="panel chart-panel">
          <div class="chart-head">
            <div>
              <h2 id="chartTitle">Market</h2>
              <p id="chartSubTitle" class="market-title">Waiting for data</p>
            </div>
            <div class="controls">
              <div class="seg" aria-label="Price side">
                <button class="seg-button active" type="button" data-side="YES">YES</button>
                <button class="seg-button" type="button" data-side="NO">NO</button>
              </div>
              <select id="intervalSelect" class="select" aria-label="Candle interval">
                <option value="1">1m</option>
                <option value="60" selected>1h</option>
                <option value="1440">1d</option>
              </select>
            </div>
          </div>

          <div class="range-row" aria-label="Chart range">
            <button class="seg-button" type="button" data-range="1H">1H</button>
            <button class="seg-button" type="button" data-range="6H">6H</button>
            <button class="seg-button active" type="button" data-range="1D">1D</button>
            <button class="seg-button" type="button" data-range="1W">1W</button>
            <button class="seg-button" type="button" data-range="1M">1M</button>
            <button class="seg-button" type="button" data-range="ALL">ALL</button>
          </div>

          <div class="chart-wrap" id="chartWrap">
            <canvas id="chart"></canvas>
            <div id="empty" class="empty"></div>
            <div id="tooltip" class="tooltip"></div>
          </div>
        </div>

        <aside class="side">
          <div class="panel">
            <div class="metric-grid">
              <div class="metric primary">
                <span>Last</span>
                <strong id="lastPrice">-</strong>
              </div>
              <div class="metric">
                <span>Volume</span>
                <strong id="volume">-</strong>
              </div>
              <div class="metric">
                <span>YES bid / ask</span>
                <strong id="yesQuote">-</strong>
              </div>
              <div class="metric">
                <span>NO bid / ask</span>
                <strong id="noQuote">-</strong>
              </div>
            </div>
            <div class="side-section">
              <h3>Market</h3>
              <div class="meta-list">
                <div class="meta-row"><span>Ticker</span><span id="metaTicker">-</span></div>
                <div class="meta-row"><span>Status</span><span id="metaStatus">-</span></div>
                <div class="meta-row"><span>Event</span><span id="metaEvent">-</span></div>
                <div class="meta-row"><span>Open</span><span id="metaOpen">-</span></div>
                <div class="meta-row"><span>Close</span><span id="metaClose">-</span></div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="side-section">
              <h3>Related Markets</h3>
              <div id="marketList" class="market-list"></div>
              <p id="sourceNote" class="note"></p>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const API_BASE = "https://api.elections.kalshi.com/trade-api/v2";
      const JINA_BASE = "https://r.jina.ai/http://";
      const DEFAULT_TICKER = "KXTRUTHSOCIAL-26MAY30-T220";

      const state = {
        input: DEFAULT_TICKER,
        market: null,
        event: null,
        relatedMarkets: [],
        candles: [],
        plottedCandles: [],
        range: "1D",
        side: "YES",
        interval: 60,
        intervalTouched: false,
        hoverIndex: -1,
        source: "",
      };

      const el = {
        form: document.getElementById("searchForm"),
        input: document.getElementById("marketInput"),
        status: document.getElementById("status"),
        title: document.getElementById("chartTitle"),
        subtitle: document.getElementById("chartSubTitle"),
        interval: document.getElementById("intervalSelect"),
        chartWrap: document.getElementById("chartWrap"),
        canvas: document.getElementById("chart"),
        empty: document.getElementById("empty"),
        tooltip: document.getElementById("tooltip"),
        lastPrice: document.getElementById("lastPrice"),
        volume: document.getElementById("volume"),
        yesQuote: document.getElementById("yesQuote"),
        noQuote: document.getElementById("noQuote"),
        metaTicker: document.getElementById("metaTicker"),
        metaStatus: document.getElementById("metaStatus"),
        metaEvent: document.getElementById("metaEvent"),
        metaOpen: document.getElementById("metaOpen"),
        metaClose: document.getElementById("metaClose"),
        marketList: document.getElementById("marketList"),
        sourceNote: document.getElementById("sourceNote"),
      };

      const ctx = el.canvas.getContext("2d");

      function setStatus(message, tone = "neutral") {
        el.status.textContent = message;
        el.status.style.color =
          tone === "bad" ? "var(--bad)" : tone === "warn" ? "var(--warn)" : "var(--accent)";
        el.status.style.borderColor =
          tone === "bad" ? "#5b2a2a" : tone === "warn" ? "#4a3a20" : "#214233";
      }

      function showEmpty(message) {
        el.empty.textContent = message;
        el.empty.classList.toggle("show", Boolean(message));
      }

      function parseTicker(value) {
        const cleaned = String(value || "").trim().toUpperCase();
        const matches = cleaned.match(/KX[A-Z0-9-]+/g);
        return matches?.length ? matches[matches.length - 1].replace(/[^A-Z0-9-]+$/g, "") : "";
      }

      function deriveSeriesTicker(market) {
        if (state.event?.series_ticker) return state.event.series_ticker;
        const ticker = market?.ticker || "";
        const eventTicker = market?.event_ticker || ticker;
        const datedPrefix = eventTicker.match(/^(.+?)-\d{2}[A-Z]{3}\d{2}/);
        if (datedPrefix) return datedPrefix[1];
        return eventTicker.split("-")[0];
      }

      function cents(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return null;
        return number <= 1 ? number * 100 : number;
      }

      function moneyCents(value) {
        const converted = cents(value);
        return converted == null ? "-" : `${formatNumber(converted, 0)}c`;
      }

      function formatNumber(value, digits = 0) {
        const number = Number(value);
        if (!Number.isFinite(number)) return "-";
        return new Intl.NumberFormat("en-US", {
          maximumFractionDigits: digits,
          minimumFractionDigits: digits,
        }).format(number);
      }

      function formatCompact(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return "-";
        return new Intl.NumberFormat("en-US", {
          notation: "compact",
          maximumFractionDigits: 1,
        }).format(number);
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "-";
        return date.toLocaleString([], {
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function formatTs(ts) {
        return new Date(ts).toLocaleString([], {
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function quotePair(bid, ask) {
        const left = moneyCents(bid);
        const right = moneyCents(ask);
        return left === "-" && right === "-" ? "-" : `${left} / ${right}`;
      }

      function appendCacheBust(url) {
        const sep = url.includes("?") ? "&" : "?";
        return `${url}${sep}_argus=${Date.now()}`;
      }

      async function fetchJson(path) {
        const absoluteUrl = appendCacheBust(`${API_BASE}${path}`);
        const attempts = [
          { kind: "direct", url: absoluteUrl },
          { kind: "jina", url: `${JINA_BASE}${absoluteUrl.replace(/^https?:\/\//, "")}` },
        ];

        let lastError = null;
        for (const attempt of attempts) {
          try {
            const response = await fetch(attempt.url, {
              cache: "no-store",
            });
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            const text = await response.text();
            const payload = parseApiPayload(text, attempt.kind);
            if (payload?.error) {
              throw new Error(payload.error.message || payload.error.code || "Kalshi API error");
            }
            state.source = attempt.kind;
            return payload;
          } catch (error) {
            lastError = error;
          }
        }

        throw lastError || new Error("Request failed");
      }

      function parseApiPayload(text, kind) {
        if (kind === "direct") return JSON.parse(text);
        const marker = "Markdown Content:";
        const markerIndex = text.indexOf(marker);
        const content = markerIndex >= 0 ? text.slice(markerIndex + marker.length).trim() : text.trim();
        const jsonStart = content.search(/[\[{]/);
        if (jsonStart < 0) throw new Error("Proxy response did not include JSON");
        return JSON.parse(content.slice(jsonStart));
      }

      async function loadInput(value) {
        const ticker = parseTicker(value);
        if (!ticker) {
          setStatus("Ticker not found", "bad");
          showEmpty("Paste a Kalshi URL or ticker.");
          return;
        }

        state.input = ticker;
        el.input.value = ticker;
        updateUrl(ticker);
        setStatus("Loading...");
        showEmpty("");
        el.tooltip.style.display = "none";

        try {
          const loaded = await resolveMarket(ticker);
          state.market = loaded.market;
          state.event = loaded.event;
          state.relatedMarkets = loaded.markets;
          await loadCandles();
          renderAll();
          setStatus(`${state.plottedCandles.length} candles`);
        } catch (error) {
          console.error(error);
          resetData();
          setStatus("Load failed", "bad");
          showEmpty(
            "Could not load this market. Use a Kalshi market ticker or event ticker; if the public API is blocked, a proxy layer is required."
          );
        }
      }

      async function resolveMarket(ticker) {
        try {
          const marketPayload = await fetchJson(`/markets/${encodeURIComponent(ticker)}`);
          const market = marketPayload.market;
          let event = null;
          let markets = [market];
          if (market?.event_ticker) {
            try {
              const eventPayload = await fetchJson(`/events/${encodeURIComponent(market.event_ticker)}`);
              event = eventPayload.event || null;
              markets = eventPayload.markets?.length ? eventPayload.markets : markets;
            } catch (error) {
              console.warn("Related event load failed", error);
            }
          }
          return { market, event, markets };
        } catch (marketError) {
          const eventPayload = await fetchJson(`/events/${encodeURIComponent(ticker)}`);
          const markets = eventPayload.markets || [];
          if (!markets.length) throw marketError;
          return {
            market: pickDefaultMarket(markets),
            event: eventPayload.event || null,
            markets,
          };
        }
      }

      function pickDefaultMarket(markets) {
        return [...markets].sort((a, b) => {
          const bInterest = Number(b.open_interest_fp || 0);
          const aInterest = Number(a.open_interest_fp || 0);
          if (bInterest !== aInterest) return bInterest - aInterest;
          return Number(b.volume_24h || b.volume || 0) - Number(a.volume_24h || a.volume || 0);
        })[0];
      }

      async function loadCandles() {
        const market = state.market;
        if (!market?.ticker) throw new Error("No market selected");
        const { start, end } = getTimeWindow(market);
        const series = deriveSeriesTicker(market);
        const params = new URLSearchParams({
          start_ts: String(Math.floor(start / 1000)),
          end_ts: String(Math.floor(end / 1000)),
          period_interval: String(state.interval),
        });

        let payload;
        try {
          payload = await fetchJson(
            `/series/${encodeURIComponent(series)}/markets/${encodeURIComponent(market.ticker)}/candlesticks?${params}`
          );
        } catch (activeError) {
          payload = await fetchJson(
            `/historical/markets/${encodeURIComponent(market.ticker)}/candlesticks?${params}`
          );
        }

        state.candles = (payload.candlesticks || []).map(normalizeCandle).filter(Boolean);
        state.plottedCandles = state.candles.map(applySide);
      }

      function getTimeWindow(market) {
        const now = Date.now();
        const closeTime = Date.parse(market.close_time || market.expiration_time || "");
        const end = Number.isFinite(closeTime) && closeTime < now ? closeTime : now;
        const allStart = Date.parse(market.open_time || market.created_time || "");
        const fallbackStart = end - 30 * 24 * 60 * 60 * 1000;
        const rangeMs = {
          "1H": 60 * 60 * 1000,
          "6H": 6 * 60 * 60 * 1000,
          "1D": 24 * 60 * 60 * 1000,
          "1W": 7 * 24 * 60 * 60 * 1000,
          "1M": 30 * 24 * 60 * 60 * 1000,
        }[state.range];

        const start =
          state.range === "ALL"
            ? Number.isFinite(allStart)
              ? allStart
              : fallbackStart
            : end - rangeMs;

        return { start: Math.max(0, start), end };
      }

      function normalizeCandle(candle) {
        const price = candle.price || {};
        const open = cents(price.open_dollars);
        const high = cents(price.high_dollars);
        const low = cents(price.low_dollars);
        const close = cents(price.close_dollars);
        const ts = Number(candle.end_period_ts) * 1000;
        if (![open, high, low, close, ts].every(Number.isFinite)) return null;
        return {
          ts,
          open,
          high,
          low,
          close,
          volume: Number(candle.volume_fp || candle.volume || 0),
        };
      }

      function applySide(candle) {
        if (state.side === "YES") return { ...candle };
        return {
          ts: candle.ts,
          open: 100 - candle.open,
          high: 100 - candle.low,
          low: 100 - candle.high,
          close: 100 - candle.close,
          volume: candle.volume,
        };
      }

      function resetData() {
        state.market = null;
        state.event = null;
        state.relatedMarkets = [];
        state.candles = [];
        state.plottedCandles = [];
        renderAll();
      }

      function updateUrl(ticker) {
        const url = new URL(window.location.href);
        url.searchParams.set("ticker", ticker);
        history.replaceState(null, "", url);
      }

      function renderAll() {
        renderHeader();
        renderMetrics();
        renderMeta();
        renderMarketList();
        drawChart();
      }

      function renderHeader() {
        const market = state.market;
        if (!market) {
          el.title.textContent = "Market";
          el.subtitle.textContent = "Waiting for data";
          return;
        }

        const label = marketLabel(market);
        el.title.textContent = label;
        el.subtitle.textContent = `${market.title || state.event?.title || "Kalshi market"} - ${market.ticker}`;
      }

      function marketLabel(market) {
        return (
          market.yes_sub_title ||
          market.sub_title ||
          market.no_sub_title ||
          market.title ||
          market.ticker ||
          "Market"
        );
      }

      function renderMetrics() {
        const market = state.market;
        if (!market) {
          el.lastPrice.textContent = "-";
          el.volume.textContent = "-";
          el.yesQuote.textContent = "-";
          el.noQuote.textContent = "-";
          return;
        }

        const yesLast = cents(market.last_price_dollars);
        const last = yesLast == null ? null : state.side === "YES" ? yesLast : 100 - yesLast;
        el.lastPrice.textContent = Number.isFinite(last) ? `${formatNumber(last, 0)}c` : "-";
        el.volume.textContent = formatCompact(totalVolume());
        el.yesQuote.textContent = quotePair(market.yes_bid_dollars, market.yes_ask_dollars);
        el.noQuote.textContent = quotePair(market.no_bid_dollars, market.no_ask_dollars);
      }

      function totalVolume() {
        return state.candles.reduce((sum, candle) => sum + (Number(candle.volume) || 0), 0);
      }

      function renderMeta() {
        const market = state.market;
        el.metaTicker.textContent = market?.ticker || "-";
        el.metaStatus.textContent = market?.status || "-";
        el.metaEvent.textContent = market?.event_ticker || state.event?.event_ticker || "-";
        el.metaOpen.textContent = formatDate(market?.open_time);
        el.metaClose.textContent = formatDate(market?.close_time || market?.expiration_time);
        el.sourceNote.textContent =
          state.source === "jina"
            ? "Kalshi blocks direct browser reads; data is read through a lightweight public fetch bridge."
            : state.source === "direct"
              ? "Data source: Kalshi public API."
              : "";
      }

      function renderMarketList() {
        el.marketList.innerHTML = "";
        const markets = state.relatedMarkets || [];
        if (!markets.length) {
          const row = document.createElement("div");
          row.className = "note";
          row.textContent = "No related markets loaded.";
          el.marketList.append(row);
          return;
        }

        for (const market of markets) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `market-row${market.ticker === state.market?.ticker ? " active" : ""}`;
          button.innerHTML = `
            <span>
              <strong>${escapeHtml(marketLabel(market))}</strong>
              <small>${escapeHtml(market.ticker || "")}</small>
            </span>
            <span class="market-price">${moneyCents(market.last_price_dollars)}</span>
          `;
          button.addEventListener("click", async () => {
            state.market = market;
            state.input = market.ticker;
            el.input.value = market.ticker;
            updateUrl(market.ticker);
            setStatus("Loading...");
            await loadCandles();
            renderAll();
            setStatus(`${state.plottedCandles.length} candles`);
          });
          el.marketList.append(button);
        }
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          }[char];
        });
      }

      function drawChart() {
        const candles = state.plottedCandles;
        const rect = el.chartWrap.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.floor(rect.width));
        const height = Math.max(1, Math.floor(rect.height));
        el.canvas.width = Math.floor(width * dpr);
        el.canvas.height = Math.floor(height * dpr);
        el.canvas.style.width = `${width}px`;
        el.canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, width, height);

        if (!candles.length) {
          showEmpty(state.market ? "No candles in this range." : "Load a market to draw candles.");
          return;
        }

        showEmpty("");
        const margin = { top: 22, right: 54, bottom: 30, left: 18 };
        const volumeHeight = Math.max(72, Math.floor(height * 0.18));
        const chartBottom = height - margin.bottom - volumeHeight - 14;
        const chartHeight = chartBottom - margin.top;
        const chartWidth = width - margin.left - margin.right;
        const volumeTop = chartBottom + 16;
        const volumeBottom = height - margin.bottom;
        const xStep = chartWidth / Math.max(candles.length, 1);
        const bodyWidth = Math.max(2, Math.min(18, xStep * 0.62));
        const scale = priceScale(candles);
        const maxVolume = Math.max(...candles.map((candle) => candle.volume), 1);

        drawGrid(width, height, margin, chartBottom, volumeTop, volumeBottom, scale);

        candles.forEach((candle, index) => {
          const x = margin.left + xStep * index + xStep / 2;
          const yOpen = yFor(candle.open, scale, margin.top, chartHeight);
          const yClose = yFor(candle.close, scale, margin.top, chartHeight);
          const yHigh = yFor(candle.high, scale, margin.top, chartHeight);
          const yLow = yFor(candle.low, scale, margin.top, chartHeight);
          const up = candle.close >= candle.open;
          const color = up ? "rgba(73, 209, 139, 0.92)" : "rgba(255, 107, 107, 0.9)";

          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, yHigh);
          ctx.lineTo(x, yLow);
          ctx.stroke();

          const bodyTop = Math.min(yOpen, yClose);
          const bodyHeight = Math.max(2, Math.abs(yClose - yOpen));
          ctx.fillStyle = color;
          ctx.fillRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);

          const volumeHeightPx = ((Number(candle.volume) || 0) / maxVolume) * (volumeBottom - volumeTop);
          ctx.fillStyle = up ? "rgba(73, 209, 139, 0.38)" : "rgba(255, 107, 107, 0.34)";
          ctx.fillRect(x - bodyWidth / 2, volumeBottom - volumeHeightPx, bodyWidth, volumeHeightPx);
        });

        drawLastLine(candles[candles.length - 1], width, margin, chartHeight, scale);
        drawHover(margin, chartHeight, chartBottom, xStep, bodyWidth, scale);
      }

      function priceScale(candles) {
        const lows = candles.map((candle) => candle.low);
        const highs = candles.map((candle) => candle.high);
        let min = Math.min(...lows);
        let max = Math.max(...highs);
        const pad = Math.max(2, (max - min) * 0.16);
        min = Math.max(0, min - pad);
        max = Math.min(100, max + pad);
        if (max - min < 6) {
          const center = (max + min) / 2;
          min = Math.max(0, center - 3);
          max = Math.min(100, center + 3);
        }
        return { min, max };
      }

      function yFor(price, scale, top, height) {
        return top + ((scale.max - price) / (scale.max - scale.min || 1)) * height;
      }

      function drawGrid(width, height, margin, chartBottom, volumeTop, volumeBottom, scale) {
        ctx.save();
        ctx.strokeStyle = "rgba(135, 147, 142, 0.12)";
        ctx.lineWidth = 1;
        ctx.font = "11px ui-monospace, SFMono-Regular, Menlo, monospace";
        ctx.fillStyle = "rgba(135, 147, 142, 0.9)";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";

        const levels = 5;
        for (let i = 0; i <= levels; i += 1) {
          const value = scale.max - ((scale.max - scale.min) / levels) * i;
          const y = yFor(value, scale, margin.top, chartBottom - margin.top);
          ctx.beginPath();
          ctx.moveTo(margin.left, y);
          ctx.lineTo(width - margin.right + 8, y);
          ctx.stroke();
          ctx.fillText(`${formatNumber(value, 0)}c`, width - margin.right + 14, y);
        }

        ctx.strokeStyle = "rgba(135, 147, 142, 0.16)";
        ctx.beginPath();
        ctx.moveTo(margin.left, chartBottom);
        ctx.lineTo(width - margin.right + 8, chartBottom);
        ctx.moveTo(margin.left, volumeTop);
        ctx.lineTo(width - margin.right + 8, volumeTop);
        ctx.moveTo(margin.left, volumeBottom);
        ctx.lineTo(width - margin.right + 8, volumeBottom);
        ctx.stroke();
        ctx.restore();
      }

      function drawLastLine(last, width, margin, chartHeight, scale) {
        const y = yFor(last.close, scale, margin.top, chartHeight);
        ctx.save();
        ctx.setLineDash([2, 3]);
        ctx.strokeStyle = "rgba(73, 209, 139, 0.65)";
        ctx.beginPath();
        ctx.moveTo(margin.left, y);
        ctx.lineTo(width - margin.right + 8, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#49d18b";
        ctx.fillRect(width - margin.right + 10, y - 10, 38, 20);
        ctx.fillStyle = "#05100b";
        ctx.font = "800 11px ui-monospace, SFMono-Regular, Menlo, monospace";
        ctx.textBaseline = "middle";
        ctx.fillText(`${formatNumber(last.close, 0)}c`, width - margin.right + 16, y);
        ctx.restore();
      }

      function drawHover(margin, chartHeight, chartBottom, xStep, bodyWidth, scale) {
        const index = state.hoverIndex;
        const candle = state.plottedCandles[index];
        if (!candle) return;

        const rect = el.chartWrap.getBoundingClientRect();
        const x = margin.left + xStep * index + xStep / 2;
        const y = yFor(candle.close, scale, margin.top, chartHeight);

        ctx.save();
        ctx.strokeStyle = "rgba(231, 236, 233, 0.22)";
        ctx.setLineDash([3, 4]);
        ctx.beginPath();
        ctx.moveTo(x, margin.top);
        ctx.lineTo(x, chartBottom);
        ctx.moveTo(margin.left, y);
        ctx.lineTo(rect.width - margin.right + 8, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        el.tooltip.innerHTML = `
          <strong>${formatTs(candle.ts)} - ${state.side}</strong>
          <div class="tooltip-grid">
            <span>Open</span><span>${formatNumber(candle.open, 1)}c</span>
            <span>High</span><span>${formatNumber(candle.high, 1)}c</span>
            <span>Low</span><span>${formatNumber(candle.low, 1)}c</span>
            <span>Close</span><span>${formatNumber(candle.close, 1)}c</span>
            <span>Volume</span><span>${formatCompact(candle.volume)}</span>
          </div>
        `;
        el.tooltip.style.display = "block";
        const left = Math.min(rect.width - 230, Math.max(10, x + 12));
        const top = Math.min(rect.height - 142, Math.max(10, y - 18));
        el.tooltip.style.left = `${left}px`;
        el.tooltip.style.top = `${top}px`;
      }

      function updateRangeButtons() {
        document.querySelectorAll("[data-range]").forEach((button) => {
          button.classList.toggle("active", button.dataset.range === state.range);
        });
      }

      function updateSideButtons() {
        document.querySelectorAll("[data-side]").forEach((button) => {
          button.classList.toggle("active", button.dataset.side === state.side);
        });
      }

      function recommendedInterval(range) {
        if (range === "1H" || range === "6H") return 1;
        if (range === "1M" || range === "ALL") return 1440;
        return 60;
      }

      el.form.addEventListener("submit", (event) => {
        event.preventDefault();
        loadInput(el.input.value);
      });

      el.interval.addEventListener("change", async () => {
        state.interval = Number(el.interval.value);
        state.intervalTouched = true;
        if (!state.market) return;
        setStatus("Loading...");
        try {
          await loadCandles();
          renderAll();
          setStatus(`${state.plottedCandles.length} candles`);
        } catch (error) {
          console.error(error);
          setStatus("Load failed", "bad");
          showEmpty("Could not load candles for this interval.");
        }
      });

      document.querySelectorAll("[data-range]").forEach((button) => {
        button.addEventListener("click", async () => {
          state.range = button.dataset.range;
          if (!state.intervalTouched) {
            state.interval = recommendedInterval(state.range);
            el.interval.value = String(state.interval);
          }
          updateRangeButtons();
          if (!state.market) return;
          setStatus("Loading...");
          try {
            await loadCandles();
            renderAll();
            setStatus(`${state.plottedCandles.length} candles`);
          } catch (error) {
            console.error(error);
            setStatus("Load failed", "bad");
            showEmpty("Could not load candles for this range.");
          }
        });
      });

      document.querySelectorAll("[data-side]").forEach((button) => {
        button.addEventListener("click", () => {
          state.side = button.dataset.side;
          state.plottedCandles = state.candles.map(applySide);
          updateSideButtons();
          renderMetrics();
          drawChart();
        });
      });

      el.chartWrap.addEventListener("mousemove", (event) => {
        if (!state.plottedCandles.length) return;
        const rect = el.chartWrap.getBoundingClientRect();
        const margin = { left: 18, right: 54 };
        const width = rect.width - margin.left - margin.right;
        const x = event.clientX - rect.left - margin.left;
        const index = Math.round((x / width) * (state.plottedCandles.length - 1));
        state.hoverIndex = Math.max(0, Math.min(state.plottedCandles.length - 1, index));
        drawChart();
      });

      el.chartWrap.addEventListener("mouseleave", () => {
        state.hoverIndex = -1;
        el.tooltip.style.display = "none";
        drawChart();
      });

      new ResizeObserver(() => drawChart()).observe(el.chartWrap);

      const initialTicker = new URLSearchParams(window.location.search).get("ticker") || DEFAULT_TICKER;
      el.input.value = initialTicker;
      updateRangeButtons();
      updateSideButtons();
      loadInput(initialTicker);
    </script>
  </body>
</html>
