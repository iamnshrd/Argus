name: Truth Social Forecast Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/truthsocial-pages.yml"
      - "truthsocial-forecast/**"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: truthsocial-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build forecast data
        run: python truthsocial-forecast/build_pages_data.py
      - name: Stage Pages artifact
        run: |
          rm -rf truthsocial-forecast/pages-build
          mkdir -p truthsocial-forecast/pages-build/Trump/Truth
          cp -R truthsocial-forecast/pages/. truthsocial-forecast/pages-build/Trump/Truth/
          touch truthsocial-forecast/pages-build/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: truthsocial-forecast/pages-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
